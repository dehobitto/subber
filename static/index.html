<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subber - GitHub Release Notifications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }

        h1 {
            color: #58a6ff;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #8b949e;
            margin-bottom: 24px;
            font-size: 14px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #c9d1d9;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }

        input:focus {
            border-color: #58a6ff;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #2ea043;
        }

        .msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .msg.ok {
            display: block;
            background: #1a3a2a;
            color: #3fb950;
            border: 1px solid #238636;
        }

        .msg.err {
            display: block;
            background: #3a1a1a;
            color: #f85149;
            border: 1px solid #da3633;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Subber</h1>
        <p>Subscribe to GitHub repository release notifications</p>
        <form id="form">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
            <label for="repo">Repository (owner/repo)</label>
            <input type="text" id="repo" placeholder="golang/go" required>
            <label for="apikey">API Key (optional)</label>
            <input type="password" id="apikey" placeholder="Your API Key">
            <button type="submit">Subscribe</button>
        </form>
        <div id="msg" class="msg"></div>
    </div>
    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.className = 'msg';
            msg.style.display = 'none';

            const email = document.getElementById('email').value;
            const repo = document.getElementById('repo').value;
            const apikey = document.getElementById('apikey').value;

            try {
                const res = await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apikey
                    },
                    body: JSON.stringify({ email, repo })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = data.success || 'Subscribed successfully!';
                    msg.className = 'msg ok';
                } else {
                    msg.textContent = data.error || 'Something went wrong';
                    msg.className = 'msg err';
                }
            } catch {
                msg.textContent = 'Network error';
                msg.className = 'msg err';
            }
        });
    </script>
</body>

</html>
